<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 72" fill="none">
  <!--
    CONCEITO B — "O Lar Acolhedor"
    Uma casa com contornos suaves (não geométricos) onde a chama está no interior.
    A chama é protegida — como os residentes dentro da Vila.
    Azul profundo para a casa, âmbar para a chama interior.
  -->

  <!-- Casa: forma de pétala/arco suave. Paredes curvas, telhado arredondado. -->
  <path d="
    M 10,62
    L 10,36
    C 10,16 32,4 32,4
    C 32,4 54,16 54,36
    L 54,62
    Z
  " fill="#2B5F8A"/>

  <!-- Abertura interna da casa — cria profundidade -->
  <path d="
    M 16,62
    L 16,38
    C 16,22 32,12 32,12
    C 32,12 48,22 48,38
    L 48,62
    Z
  " fill="#1a3d5c"/>

  <!-- Chama interior — âmbar, viva, no coração da casa -->
  <path d="
    M 32,56
    C 25,51 21,43 24,34
    C 26,27 32,23 32,23
    C 32,23 38,27 40,34
    C 43,43 39,51 32,56
    Z
  " fill="#C96B1E"/>

  <!-- Brilho da chama -->
  <ellipse cx="32" cy="40" rx="5" ry="8" fill="#F5C89A" opacity="0.9"/>

  <!-- Ponto de luz no topo da casa -->
  <circle cx="32" cy="8" r="3" fill="#C96B1E" opacity="0.7"/>

  <!-- VILA -->
  <text
    x="66" y="30"
    font-family="'Plus Jakarta Sans', 'Segoe UI', sans-serif"
    font-size="11"
    font-weight="400"
    fill="#4A8BBF"
    letter-spacing="3"
  >VILA</text>

  <!-- Focolare -->
  <text
    x="66" y="52"
    font-family="'Plus Jakarta Sans', 'Segoe UI', sans-serif"
    font-size="22"
    font-weight="700"
    fill="#2B5F8A"
    letter-spacing="0.5"
  >Focolare</text>

  <text
    x="67" y="65"
    font-family="'Plus Jakarta Sans', 'Segoe UI', sans-serif"
    font-size="8"
    font-weight="400"
    fill="#64748B"
    letter-spacing="1"
  >Cuidado com alma</text>
</svg>

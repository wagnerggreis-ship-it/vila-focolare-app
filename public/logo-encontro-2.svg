<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 80" fill="none">
  <!--
    ENCONTRO 2 — "O Abraço"
    Dois braços que sobem das laterais, curvam-se para dentro
    e se encontram no alto — formando uma chama no espaço que abraçam.
    O gesto do abraço é o gesto do cuidado.
    A chama nasce do encontro das mãos que se unem.
  -->

  <!-- Braço esquerdo — azul profundo, sobe e curva para dentro -->
  <path d="
    M 8,68
    C 8,60 8,50 10,42
    C 12,32 18,22 28,14
    C 32,11 34,10 36,11
    C 32,14 28,20 26,28
    C 24,36 24,46 24,56
    L 22,68 Z
  " fill="#2B5F8A"/>

  <!-- Braço direito — azul médio, espelho -->
  <path d="
    M 64,68
    C 64,60 64,50 62,42
    C 60,32 54,22 44,14
    C 40,11 38,10 36,11
    C 40,14 44,20 46,28
    C 48,36 48,46 48,56
    L 50,68 Z
  " fill="#2B5F8A" opacity="0.8"/>

  <!-- A chama que nasce do abraço — âmbar -->
  <path d="
    M 36,14
    C 30,20 26,30 26,40
    C 26,52 30,62 36,68
    C 42,62 46,52 46,40
    C 46,30 42,20 36,14 Z
  " fill="#C96B1E"/>

  <!-- Núcleo da chama — luz viva -->
  <ellipse cx="36" cy="44" rx="7" ry="13" fill="#E8924A"/>
  <ellipse cx="36" cy="46" rx="4" ry="8" fill="#F5C89A" opacity="0.9"/>

  <!-- Ponto de encontro no topo — o instante do abraço -->
  <circle cx="36" cy="10" r="4" fill="#C96B1E"/>
  <circle cx="36" cy="10" r="2" fill="#F5C89A"/>

  <!-- VILA -->
  <text x="80" y="32"
    font-family="'Plus Jakarta Sans','Segoe UI',sans-serif"
    font-size="11" font-weight="400" fill="#4A8BBF" letter-spacing="3">VILA</text>

  <text x="80" y="56"
    font-family="'Plus Jakarta Sans','Segoe UI',sans-serif"
    font-size="23" font-weight="700" fill="#2B5F8A" letter-spacing="0.5">Focolare</text>

  <text x="81" y="69"
    font-family="'Plus Jakarta Sans','Segoe UI',sans-serif"
    font-size="8" font-weight="400" fill="#64748B" letter-spacing="1.2">Cuidado com alma</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 80" fill="none">
  <!--
    ENCONTRO 4 — "O Coração"
    Duas chamas/pétalas que se inclinam uma em direção à outra
    e formam, juntas, a silhueta de um coração.
    O coração não é explícito — ele emerge do encontro.
    Amor, cuidado, doação: a linguagem universal da Vila Focolare.
    Azul para os dois elementos; âmbar no ponto de toque (o coração).
  -->

  <!-- Pétala esquerda — inclina para a direita, forma metade do coração -->
  <path d="
    M 36,66
    C 24,58 10,46 8,32
    C 6,20 12,10 22,8
    C 28,6 34,10 36,16
    C 32,20 28,28 28,36
    C 28,46 30,56 36,66 Z
  " fill="#2B5F8A"/>

  <!-- Pétala direita — espelho, inclina para a esquerda -->
  <path d="
    M 36,66
    C 48,58 62,46 64,32
    C 66,20 60,10 50,8
    C 44,6 38,10 36,16
    C 40,20 44,28 44,36
    C 44,46 42,56 36,66 Z
  " fill="#2B5F8A" opacity="0.82"/>

  <!-- Ponto de toque superior — onde os dois se unem (o topo do coração) -->
  <!-- Aqui fica a "reentrância" do coração — a chama âmbar surge exatamente ali -->
  <path d="
    M 28,20
    C 30,14 33,11 36,11
    C 39,11 42,14 44,20
    C 42,24 39,26 36,28
    C 33,26 30,24 28,20 Z
  " fill="#C96B1E"/>

  <!-- Brilho no ponto de toque -->
  <ellipse cx="36" cy="20" rx="5" ry="4" fill="#F5C89A" opacity="0.8"/>

  <!-- Ponto luminoso central — o calor do coração -->
  <ellipse cx="36" cy="42" rx="5" ry="9" fill="#C96B1E" opacity="0.25"/>

  <!-- VILA -->
  <text x="82" y="32"
    font-family="'Plus Jakarta Sans','Segoe UI',sans-serif"
    font-size="11" font-weight="400" fill="#4A8BBF" letter-spacing="3">VILA</text>

  <text x="82" y="56"
    font-family="'Plus Jakarta Sans','Segoe UI',sans-serif"
    font-size="23" font-weight="700" fill="#2B5F8A" letter-spacing="0.5">Focolare</text>

  <text x="83" y="69"
    font-family="'Plus Jakarta Sans','Segoe UI',sans-serif"
    font-size="8" font-weight="400" fill="#64748B" letter-spacing="1.2">Cuidado com alma</text>
</svg>

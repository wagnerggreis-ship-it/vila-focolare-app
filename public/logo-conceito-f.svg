<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 72" fill="none">
  <!--
    CONCEITO F — "O Brasão" / Círculo Sagrado
    Um círculo perfeito envolve a chama. O círculo representa:
    - Comunidade (o círculo de pessoas)
    - Totalidade, completude
    - O mandala / a mandorla (referência sagrada)
    - A moeda/selo institucional — transmite solidez e credibilidade

    Dentro do círculo: uma chama elegante.
    Fora: o nome em arc (opcional) — aqui versão limpa sem texto no arco.

    Paleta: círculo em azul, chama em âmbar.
  -->

  <!-- Círculo externo — traço azul profundo -->
  <circle cx="33" cy="34" r="28" stroke="#2B5F8A" stroke-width="2.5" fill="none"/>

  <!-- Círculo interno sutil — cria profundidade -->
  <circle cx="33" cy="34" r="23.5" stroke="#2B5F8A" stroke-width="0.8" fill="none" opacity="0.3"/>

  <!-- Fundo interno — levemente preenchido -->
  <circle cx="33" cy="34" r="25.5" fill="#2B5F8A" opacity="0.06"/>

  <!-- Chama interna — elegante, proporcional ao círculo -->
  <path d="
    M 33,54
    C 25,49 20,41 23,31
    C 25,23 33,17 33,17
    C 33,17 41,23 43,31
    C 46,41 41,49 33,54 Z
  " fill="#2B5F8A"/>

  <!-- Chama interna — núcleo âmbar -->
  <path d="
    M 33,50
    C 27,46 24,39 27,31
    C 28.5,25 33,22 33,22
    C 33,22 37.5,25 39,31
    C 42,39 39,46 33,50 Z
  " fill="#C96B1E"/>

  <!-- Brilho central -->
  <ellipse cx="33" cy="37" rx="5" ry="8" fill="#F5C89A" opacity="0.85"/>

  <!-- Pontos decorativos nos 4 quadrantes — referência a símbolos sagrados -->
  <circle cx="33" cy="8.5" r="1.8" fill="#C96B1E" opacity="0.7"/>
  <circle cx="33" cy="59.5" r="1.8" fill="#2B5F8A" opacity="0.4"/>
  <circle cx="7.5" cy="34" r="1.8" fill="#2B5F8A" opacity="0.4"/>
  <circle cx="58.5" cy="34" r="1.8" fill="#2B5F8A" opacity="0.4"/>

  <!-- VILA -->
  <text
    x="74" y="28"
    font-family="'Plus Jakarta Sans', 'Segoe UI', sans-serif"
    font-size="11"
    font-weight="400"
    fill="#4A8BBF"
    letter-spacing="3"
  >VILA</text>

  <!-- Focolare -->
  <text
    x="74" y="50"
    font-family="'Plus Jakarta Sans', 'Segoe UI', sans-serif"
    font-size="22"
    font-weight="700"
    fill="#2B5F8A"
    letter-spacing="0.5"
  >Focolare</text>

  <text
    x="75" y="63"
    font-family="'Plus Jakarta Sans', 'Segoe UI', sans-serif"
    font-size="8"
    font-weight="400"
    fill="#64748B"
    letter-spacing="1"
  >Cuidado com alma</text>
</svg>

  <!-- Wordmark -->
  <text x="56" y="28" font-family="'Plus Jakarta Sans', sans-serif" font-size="11" font-weight="400" fill="#4A8BBF" letter-spacing="1.5">VILA</text>
  <text x="56" y="44" font-family="'Plus Jakarta Sans', sans-serif" font-size="16" font-weight="700" fill="#2B5F8A" letter-spacing="0.5">Focolare</text>

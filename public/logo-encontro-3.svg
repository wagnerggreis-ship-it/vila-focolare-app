<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 80" fill="none">
  <!--
    ENCONTRO 3 — "Os Dois Rios"
    Dois cursos d'água (ou duas chamas) que nascem separados
    nas extremidades e convergem para um único ponto de luz no centro.
    Na espiritualidade Focolare: dois "eus" que se doam mutuamente
    e no encontro geram algo novo — a chama da comunhão.
    Fluido, dinâmico, orgânico.
  -->

  <!-- Rio / chama esquerda — parte de baixo-esquerda, sobe e curva para o centro -->
  <path d="
    M 6,70
    C 8,60 12,48 18,38
    C 24,28 30,22 36,18
    C 30,20 24,26 20,36
    C 16,46 14,58 12,70 Z
  " fill="#2B5F8A"/>

  <!-- Corpo maior do rio esquerdo -->
  <path d="
    M 4,70
    C 6,58 10,44 18,32
    C 24,22 32,14 36,12
    C 26,16 18,26 14,38
    C 10,50 8,62 6,70 Z
  " fill="#2B5F8A" opacity="0.5"/>

  <!-- Rio / chama direita — parte de baixo-direita, sobe e curva para o centro -->
  <path d="
    M 66,70
    C 64,60 60,48 54,38
    C 48,28 42,22 36,18
    C 42,20 48,26 52,36
    C 56,46 58,58 60,70 Z
  " fill="#2B5F8A"/>

  <!-- Corpo maior do rio direito -->
  <path d="
    M 68,70
    C 66,58 62,44 54,32
    C 48,22 40,14 36,12
    C 46,16 54,26 58,38
    C 62,50 64,62 66,70 Z
  " fill="#2B5F8A" opacity="0.5"/>

  <!-- O ponto de encontro — a chama da comunhão, âmbar -->
  <path d="
    M 36,8
    C 30,12 26,20 26,30
    C 26,38 30,44 36,48
    C 42,44 46,38 46,30
    C 46,20 42,12 36,8 Z
  " fill="#C96B1E"/>

  <!-- Brilho do encontro -->
  <ellipse cx="36" cy="30" rx="6" ry="10" fill="#E8924A"/>
  <ellipse cx="36" cy="31" rx="3" ry="6" fill="#F5C89A" opacity="0.9"/>

  <!-- Ponta da chama — o ápice -->
  <ellipse cx="36" cy="8" rx="2.5" ry="3.5" fill="#C96B1E"/>

  <!-- VILA -->
  <text x="82" y="32"
    font-family="'Plus Jakarta Sans','Segoe UI',sans-serif"
    font-size="11" font-weight="400" fill="#4A8BBF" letter-spacing="3">VILA</text>

  <text x="82" y="56"
    font-family="'Plus Jakarta Sans','Segoe UI',sans-serif"
    font-size="23" font-weight="700" fill="#2B5F8A" letter-spacing="0.5">Focolare</text>

  <text x="83" y="69"
    font-family="'Plus Jakarta Sans','Segoe UI',sans-serif"
    font-size="8" font-weight="400" fill="#64748B" letter-spacing="1.2">Cuidado com alma</text>
</svg>

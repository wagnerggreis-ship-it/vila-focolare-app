<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 72" fill="none">
  <!--
    CONCEITO G — "O Amanhecer"
    Um sol nascente / arco de luz.

    Referências:
    - Novo dia, esperança, renovação (relevante em cuidados paliativos)
    - A luz que "vem do leste" — referência espiritual/bíblica
    - Calor que irradia para todos — o cuidado que se espalha
    - Movimento dos Focolares: "onde dois ou três estiverem..."

    O sol é o focolare — a lareira é o sol da casa.
    Semicírculo + raios + chama central.

    Paleta: arco em azul, raios em azul médio, centro em âmbar.
  -->

  <!-- Semicírculo base — o horizonte -->
  <path d="M 8,50 A 26,26 0 0 1 60,50 Z" fill="#2B5F8A"/>

  <!-- Raios do sol — 7 raios (número sagrado) em diferentes comprimentos -->
  <!-- Raio central (vertical) -->
  <line x1="34" y1="48" x2="34" y2="10" stroke="#2B5F8A" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Raios laterais -->
  <line x1="34" y1="48" x2="18" y2="16" stroke="#2B5F8A" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <line x1="34" y1="48" x2="50" y2="16" stroke="#2B5F8A" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <line x1="34" y1="48" x2="10" y2="28" stroke="#2B5F8A" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="34" y1="48" x2="58" y2="28" stroke="#2B5F8A" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="34" y1="48" x2="6" y2="42" stroke="#2B5F8A" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  <line x1="34" y1="48" x2="62" y2="42" stroke="#2B5F8A" stroke-width="1" stroke-linecap="round" opacity="0.4"/>

  <!-- Núcleo solar — âmbar quente -->
  <circle cx="34" cy="48" r="10" fill="#C96B1E"/>
  <circle cx="34" cy="48" r="6.5" fill="#E8924A"/>
  <circle cx="34" cy="48" r="3.5" fill="#F5C89A"/>

  <!-- Linha do horizonte -->
  <line x1="5" y1="50" x2="63" y2="50" stroke="#2B5F8A" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

  <!-- VILA -->
  <text
    x="76" y="28"
    font-family="'Plus Jakarta Sans', 'Segoe UI', sans-serif"
    font-size="11"
    font-weight="400"
    fill="#4A8BBF"
    letter-spacing="3"
  >VILA</text>

  <!-- Focolare -->
  <text
    x="76" y="50"
    font-family="'Plus Jakarta Sans', 'Segoe UI', sans-serif"
    font-size="22"
    font-weight="700"
    fill="#2B5F8A"
    letter-spacing="0.5"
  >Focolare</text>

  <text
    x="77" y="63"
    font-family="'Plus Jakarta Sans', 'Segoe UI', sans-serif"
    font-size="8"
    font-weight="400"
    fill="#64748B"
    letter-spacing="1"
  >Cuidado com alma</text>
</svg>

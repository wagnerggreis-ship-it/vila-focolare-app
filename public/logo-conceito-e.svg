<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 72" fill="none">
  <!--
    CONCEITO E — "A Folha Viva"
    Uma folha orgânica que também é uma chama.
    Leitura dupla: folha = vida, crescimento, natureza, cuidado.
                   chama = focolare, calor, presença.
    A assimetria leve dá organicidade e humanidade.
    Paleta: corpo em azul profundo, nervura central em âmbar.
  -->

  <!-- Corpo principal da folha/chama — azul profundo -->
  <!-- Assimétrica propositalmente: lado esquerdo mais redondo, direito mais afilado -->
  <path d="
    M 30,62
    C 14,54 8,40 12,24
    C 15,12 24,5 30,4
    C 38,5 47,14 48,28
    C 49,42 42,56 30,62 Z
  " fill="#2B5F8A"/>

  <!-- Nervura central — âmbar, referência à chama interior -->
  <path d="
    M 30,58
    C 28,48 26,36 27,22
    C 27.5,14 30,9 30,9
    C 30,9 32,14 32.5,22
    C 33,36 32,48 30,58 Z
  " fill="#C96B1E"/>

  <!-- Nervuras laterais — âmbar mais suave -->
  <!-- Esquerda superior -->
  <path d="M 29,30 C 24,26 18,22 16,18" stroke="#C96B1E" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <!-- Esquerda inferior -->
  <path d="M 29,42 C 23,40 18,36 16,32" stroke="#C96B1E" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  <!-- Direita superior -->
  <path d="M 31,30 C 36,26 41,22 43,19" stroke="#C96B1E" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <!-- Direita inferior -->
  <path d="M 31,42 C 36,40 40,37 42,33" stroke="#C96B1E" stroke-width="1" stroke-linecap="round" opacity="0.4"/>

  <!-- Ponta superior — calor vivo -->
  <ellipse cx="30" cy="7" rx="3" ry="4" fill="#C96B1E" opacity="0.9"/>

  <!-- VILA -->
  <text
    x="62" y="30"
    font-family="'Plus Jakarta Sans', 'Segoe UI', sans-serif"
    font-size="11"
    font-weight="400"
    fill="#4A8BBF"
    letter-spacing="3"
  >VILA</text>

  <!-- Focolare -->
  <text
    x="62" y="52"
    font-family="'Plus Jakarta Sans', 'Segoe UI', sans-serif"
    font-size="22"
    font-weight="700"
    fill="#2B5F8A"
    letter-spacing="0.5"
  >Focolare</text>

  <text
    x="63" y="65"
    font-family="'Plus Jakarta Sans', 'Segoe UI', sans-serif"
    font-size="8"
    font-weight="400"
    fill="#64748B"
    letter-spacing="1"
  >Cuidado com alma</text>
</svg>
